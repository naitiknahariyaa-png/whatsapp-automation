# Nginx Load Balancer Configuration
# Scale WhatsApp bot with multiple instances

upstream whatsapp_backend {
    # Load balancing method
    least_conn;  # Routes to least busy server
    
    # Backend servers (run multiple bot instances)
    server 127.0.0.1:8001 weight=5;  # Bot instance 1
    server 127.0.0.1:8002 weight=5;  # Bot instance 2
    server 127.0.0.1:8003 weight=5;  # Bot instance 3
    
    # Keep alive connections
    keepalive 32;
}

# HTTP Server (redirect to HTTPS)
server {
    listen 80;
    server_name whatsapp-bot.example.com;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name whatsapp-bot.example.com;

    # SSL Certificate
    ssl_certificate /etc/ssl/certs/bot.crt;
    ssl_certificate_key /etc/ssl/private/bot.key;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req zone=api burst=20;

    # Main location
    location / {
        proxy_pass http://whatsapp_backend;
        
        # Headers for WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://whatsapp_backend/health;
        access_log off;
    }

    # Metrics endpoint
    location /metrics {
        proxy_pass http://whatsapp_backend/metrics;
        access_log off;
    }
}

# Alternative: Single server (no load balancing)
server {
    listen 8080;
    server_name localhost;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Hub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#25D366',
                        secondary: '#128C7E',
                        dark: '#1a1a2e',
                        accent: '#e94560'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        .pulse-connected { animation: pulse-green 2s infinite; }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #128C7E; border-radius: 4px; }
    </style>
</head>
<body class="bg-gradient-to-br from-dark via-gray-900 to-dark min-h-screen text-white">
    
    <!-- Navigation -->
    <nav class="glass sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-xl">
                    💬
                </div>
                <span class="text-xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
                    WhatsApp Hub
                </span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showTab('dashboard')" class="nav-btn px-4 py-2 rounded-lg hover:bg-white/10 transition">
                    📊 Dashboard
                </button>
                <button onclick="showTab('messages')" class="nav-btn px-4 py-2 rounded-lg hover:bg-white/10 transition">
                    💬 Messages
                </button>
                <button onclick="showTab('customers')" class="nav-btn px-4 py-2 rounded-lg hover:bg-white/10 transition">
                    👥 Customers
                </button>
                <button onclick="showTab('settings')" class="nav-btn px-4 py-2 rounded-lg hover:bg-white/10 transition">
                    ⚙️ Settings
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Status Bar -->
        <div class="glass rounded-2xl p-6 mb-8 animate-fadeIn">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <div id="connectionStatus" class="flex items-center gap-2">
                        <div id="statusDot" class="w-3 h-3 rounded-full bg-gray-500"></div>
                        <span id="statusText">Checking connection...</span>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="text-center">
                        <p class="text-sm text-gray-400">Uptime</p>
                        <p id="uptime" class="text-lg font-mono">00:00:00</p>
                    </div>
                    <div class="text-center">
                        <p class="text-sm text-gray-400">Messages Today</p>
                        <p id="messagesToday" class="text-lg font-bold text-primary">0</p>
                    </div>
                    <button onclick="refreshData()" class="px-4 py-2 bg-primary/20 hover:bg-primary/30 rounded-lg transition">
                        🔄 Refresh
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            
            <div class="glass rounded-2xl p-6 animate-fadeIn hover:scale-105 transition-transform cursor-pointer">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center text-2xl">💬</div>
                    <span class="text-green-400 text-sm">+12%</span>
                </div>
                <h3 id="totalMessages" class="text-3xl font-bold mb-1">0</h3>
                <p class="text-gray-400 text-sm">Total Messages</p>
            </div>

            <div class="glass rounded-2xl p-6 animate-fadeIn hover:scale-105 transition-transform cursor-pointer">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-purple-500/20 rounded-xl flex items-center justify-center text-2xl">👥</div>
                    <span class="text-green-400 text-sm">+5</span>
                </div>
                <h3 id="totalCustomers" class="text-3xl font-bold mb-1">0</h3>
                <p class="text-gray-400 text-sm">Total Customers</p>
            </div>

            <div class="glass rounded-2xl p-6 animate-fadeIn hover:scale-105 transition-transform cursor-pointer">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-yellow-500/20 rounded-xl flex items-center justify-center text-2xl">📦</div>
                    <span class="text-green-400 text-sm">+3</span>
                </div>
                <h3 id="totalOrders" class="text-3xl font-bold mb-1">0</h3>
                <p class="text-gray-400 text-sm">Total Orders</p>
            </div>

            <div class="glass rounded-2xl p-6 animate-fadeIn hover:scale-105 transition-transform cursor-pointer">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-primary/20 rounded-xl flex items-center justify-center text-2xl">🤖</div>
                    <span class="text-green-400 text-sm">Active</span>
                </div>
                <h3 id="aiResponses" class="text-3xl font-bold mb-1">0</h3>
                <p class="text-gray-400 text-sm">AI Responses</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="glass rounded-2xl p-6">
            <h2 class="text-xl font-bold mb-6">⚡ Quick Actions</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="showComposeModal()" class="py-4 px-4 bg-primary/20 hover:bg-primary/30 rounded-xl transition flex flex-col items-center gap-2">
                    <span class="text-2xl">✉️</span>
                    <span class="text-sm">Compose</span>
                </button>
                <button onclick="showBroadcastModal()" class="py-4 px-4 bg-purple-500/20 hover:bg-purple-500/30 rounded-xl transition flex flex-col items-center gap-2">
                    <span class="text-2xl">📢</span>
                    <span class="text-sm">Broadcast</span>
                </button>
                <button onclick="testConnection()" class="py-4 px-4 bg-blue-500/20 hover:bg-blue-500/30 rounded-xl transition flex flex-col items-center gap-2">
                    <span class="text-2xl">🔧</span>
                    <span class="text-sm">Test</span>
                </button>
                <button onclick="refreshData()" class="py-4 px-4 bg-yellow-500/20 hover:bg-yellow-500/30 rounded-xl transition flex flex-col items-center gap-2">
                    <span class="text-2xl">🔄</span>
                    <span class="text-sm">Refresh</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Compose Modal -->
    <div id="composeModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-6 w-full max-w-lg animate-fadeIn">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold">✉️ Compose Message</h3>
                <button onclick="closeModal('composeModal')" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <form onsubmit="sendMessage(event)">
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">Recipient</label>
                    <input type="text" id="composePhone" placeholder="+91 98765 43210" 
                           class="w-full px-4 py-3 bg-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">Message</label>
                    <textarea id="composeMessage" rows="4" placeholder="Type your message..."
                              class="w-full px-4 py-3 bg-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary resize-none"></textarea>
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="closeModal('composeModal')" 
                            class="flex-1 py-3 bg-gray-600 hover:bg-gray-700 rounded-xl transition">Cancel</button>
                    <button type="submit" class="flex-1 py-3 bg-primary hover:bg-secondary rounded-xl transition">Send</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        
        document.addEventListener('DOMContentLoaded', () => {
            checkConnection();
            loadDashboard();
            setInterval(checkConnection, 30000);
        });
        
        async function checkConnection() {
            try {
                const response = await fetch(API_BASE + '/status');
                const data = await response.json();
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                
                if (data.connected) {
                    statusDot.className = 'w-3 h-3 rounded-full bg-green-500 pulse-connected';
                    statusText.textContent = 'WhatsApp Connected ✅';
                } else {
                    statusDot.className = 'w-3 h-3 rounded-full bg-red-500';
                    statusText.textContent = 'WhatsApp Disconnected ❌';
                }
            } catch (error) {
                document.getElementById('statusText').textContent = 'API Offline';
            }
        }
        
        async function loadDashboard() {
            try {
                const response = await fetch(API_BASE + '/stats');
                const data = await response.json();
                document.getElementById('totalMessages').textContent = data.total_messages || 0;
                document.getElementById('totalCustomers').textContent = data.total_customers || 0;
                document.getElementById('totalOrders').textContent = data.total_orders || 0;
                document.getElementById('aiResponses').textContent = data.ai_responses || 0;
                document.getElementById('messagesToday').textContent = data.messages_today || 0;
            } catch (error) {
                console.error('Failed to load dashboard');
            }
        }
        
        function showComposeModal() { document.getElementById('composeModal').classList.remove('hidden'); }
        function showBroadcastModal() { document.getElementById('broadcastModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        async function sendMessage(event) {
            event.preventDefault();
            const phone = document.getElementById('composePhone').value;
            const message = document.getElementById('composeMessage').value;
            try {
                await fetch(API_BASE + '/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, message })
                });
                closeModal('composeModal');
                loadDashboard();
            } catch (error) { alert('Failed to send message'); }
        }
        
        async function testConnection() {
            try {
                const response = await fetch(API_BASE + '/test', { method: 'POST' });
                const data = await response.json();
                alert(data.message || 'Test complete');
            } catch (error) { alert('Test failed'); }
        }
        
        function refreshData() { checkConnection(); loadDashboard(); }
        function showTab(tab) { console.log('Switch to:', tab); }
    </script>
</body>
</html>

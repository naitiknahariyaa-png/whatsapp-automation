# Docker Compose - Complete WhatsApp Bot Setup
# Run with: docker-compose up -d

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════
  # WhatsApp Bot
  # ═══════════════════════════════════════════════════════
  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-bot
    restart: unless-stopped
    
    environment:
      # API Keys
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Chatwoot (optional)
      CHATWOOT_API_URL: ${CHATWOOT_API_URL}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID:-1}
      
      # N8N (optional)
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      
      # Healthchecks (optional)
      HEALTHCHECKS_PING_URL: ${HEALTHCHECKS_PING_URL}
      
      # Bot settings
      LOG_LEVEL: INFO
      AUTO_REPLY: "true"
      SKIP_GROUPS: "true"
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    
    depends_on:
      - redis
    
    networks:
      - whatsapp-network
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5m
      timeout: 30s
      retries: 3
      start_period: 10m

  # ═══════════════════════════════════════════════════════
  # Redis (Cache & Message Broker)
  # ═══════════════════════════════════════════════════════
  redis:
    image: redis:alpine
    container_name: whatsapp-redis
    restart: unless-stopped
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis-data:/data
    
    command: redis-server --appendonly yes
    
    networks:
      - whatsapp-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ═══════════════════════════════════════════════════════
  # Celery Worker (Background Tasks)
  # ═══════════════════════════════════════════════════════
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-celery
    restart: unless-stopped
    command: celery -A src.integrations.celery_tasks worker --loglevel=info
    
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    
    volumes:
      - ./data:/app/data
    
    depends_on:
      - redis
      - whatsapp-bot
    
    networks:
      - whatsapp-network

  # ═══════════════════════════════════════════════════════
  # Celery Beat (Scheduled Tasks)
  # ═══════════════════════════════════════════════════════
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-celery-beat
    restart: unless-stopped
    command: celery -A src.integrations.celery_tasks beat --loglevel=info
    
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    
    depends_on:
      - redis
    
    networks:
      - whatsapp-network

  # ═══════════════════════════════════════════════════════
  # Nginx (Reverse Proxy / Load Balancer)
  # ═══════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: whatsapp-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    
    depends_on:
      - whatsapp-bot
    
    networks:
      - whatsapp-network

  # ═══════════════════════════════════════════════════════
  # Chatwoot (Unified Inbox) - Optional
  # ═══════════════════════════════════════════════════════
  chatwoot:
    image: chatwoot/chatwoot:latest
    container_name: whatsapp-chatwoot
    restart: unless-stopped
    
    environment:
      INSTALLATION_ENV: rails
      
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: chatwoot
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Rails
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
    
    ports:
      - "3000:3000"
    
    volumes:
      - chatwoot-data:/app/storage
    
    depends_on:
      - postgres
      - redis
    
    networks:
      - whatsapp-network

  # ═══════════════════════════════════════════════════════
  # N8N (Workflow Automation) - Optional
  # ═══════════════════════════════════════════════════════
  n8n:
    image: n8nio/n8n:latest
    container_name: whatsapp-n8n
    restart: unless-stopped
    
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-password}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
    
    ports:
      - "5678:5678"
    
    volumes:
      - n8n-data:/home/node/.n8n
    
    networks:
      - whatsapp-network

  # ═══════════════════════════════════════════════════════
  # PostgreSQL (for Chatwoot)
  # ═══════════════════════════════════════════════════════
  postgres:
    image: postgres:14-alpine
    container_name: whatsapp-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot
    
    volumes:
      - postgres-data:/var/lib/postgresql/data
    
    networks:
      - whatsapp-network

# ═══════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════
networks:
  whatsapp-network:
    driver: bridge

# ═══════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════
volumes:
  redis-data:
  chatwoot-data:
  n8n-data:
  postgres-data:

version: '3.8'

services:
  # WhatsApp Hub - Main Application
  whatsapp-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-hub
    restart: unless-stopped
    ports:
      - "8000:8000"   # Web Dashboard
      - "3000:3000"   # OpenWA API
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENWA_API_KEY=${OPENWA_API_KEY:-default}
      - WAHA_SESSION=${WAHA_SESSION:-default}
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=60
    volumes:
      - whatsapp_data:/app/data
      - whatsapp_logs:/app/logs
    networks:
      - whatsapp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # WAHA - WhatsApp HTTP API (Alternative)
  waha:
    image: devnulllabs/waha:latest
    container_name: waha
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER}
      - WHATSAPP_SESSION=${WHATSAPP_SESSION:-default}
    volumes:
      - waha_data:/data
    networks:
      - whatsapp-network

  # Redis - Caching
  redis:
    image: redis:7-alpine
    container_name: whatsapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whatsapp-network
    command: redis-server --appendonly yes

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: whatsapp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - whatsapp-hub
    networks:
      - whatsapp-network

networks:
  whatsapp-network:
    driver: bridge

volumes:
  whatsapp_data:
  whatsapp_logs:
  waha_data:
  redis_data:
  nginx_certs:
